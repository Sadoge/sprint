name: sprint
description: "A minimalist Flutter focus timer with local sprint tracking, streaks, history, and adjustable session duration."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Models
  freezed_annotation: ^3.0.0

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Navigation
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0

  # Audio
  audioplayers: ^6.1.0

  # Utilities
  package_info_plus: ^8.2.1
  in_app_review: ^2.0.10
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^3.1.0
  riverpod_generator: ^2.6.3
  drift_dev: ^2.22.1
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.5

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
